name = "serverless-qrcode-hub-docker"
main = "index.js"
compatibility_date = "2025-03-10"

# Admin password is injected via the APP_PASSWORD env var (defaults to test1234)
[vars]
PASSWORD = "${APP_PASSWORD}"

[[d1_databases]]
binding = "DB"
database_name = "qrcode_hub"
# Fixed id keeps the local SQLite file path stable across container restarts
database_id = "060f6d75-397d-4d39-b6b3-339b9224d6d7"

[assets]
directory = "./dist"
binding = "ASSETS"

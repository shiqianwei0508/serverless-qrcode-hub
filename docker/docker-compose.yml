# serverless-qrcode-hub container startup
#
# Usage:
#   Default (overseas mirror):
#     docker compose up -d --build
#   Enable the China mirror (Aliyun apt / npmmirror npm, Asia/Shanghai timezone):
#     USE_CN_MIRROR=true docker compose up -d --build
#   Custom admin password:
#     APP_PASSWORD=yourpass docker compose up -d --build
#
# Data persistence: the host ./data is mounted to /app/data, where the D1
# database (SQLite) is written, surviving container restarts and rebuilds.

services:
  qrcode-hub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        USE_CN_MIRROR: "${USE_CN_MIRROR:-}"
    image: serverless-qrcode-hub:latest
    container_name: qrcode-hub
    ports:
      - "8787:8787"
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-test1234}
    volumes:
      # Persist D1 data into the deployment's data directory
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8787/admin.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

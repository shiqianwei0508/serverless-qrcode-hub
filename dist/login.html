<!DOCTYPE html>
<html data-theme="light">

<head>
    <script src="/common.js"></script>
    <title>登录 · 二维码中枢</title>
    <meta charset="UTF-8">
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="/daisyui@5.css" rel="stylesheet" type="text/css" />
    <script src="/tailwindcss@4.js"></script>
    <link href="/theme.css" rel="stylesheet" type="text/css" />
</head>

<body class="auth-page">
    <!-- 主题切换 -->
    <div class="absolute top-4 right-4 z-20">
        <div class="tooltip tooltip-left" data-tip="切换主题">
            <button id="themeToggleBtn" class="btn btn-ghost btn-circle" aria-label="切换主题">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </div>

    <main class="flex-1 flex items-center justify-center px-4 w-full py-10">
        <div class="card w-[92%] max-w-sm bg-base-100 auth-card">
            <div class="card-body p-7 md:p-9">
                <!-- 品牌区 -->
                <div class="flex flex-col items-center text-center mb-7">
                    <div class="brand-logo mb-4">
                        <img src="/favicon.svg" alt="logo">
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight">二维码中枢</h1>
                    <p class="text-sm text-base-content/60 mt-1">Serverless QR Code Hub</p>
                </div>

                <div class="form-control w-full">
                    <label for="password" class="label pb-1">
                        <span class="label-text text-base-content/70">管理密码</span>
                    </label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="请输入管理密码"
                            class="input input-bordered w-full pl-10 text-base h-12"
                            autocomplete="current-password">
                    </div>

                    <div class="flex flex-col gap-2 mt-6">
                        <button onclick="login()" id="loginBtn"
                            class="btn btn-primary h-12 text-base w-full">
                            登 录
                        </button>
                    </div>

                    <div id="error" class="alert alert-error mt-4" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>密码错误，请重试</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-4 md:py-5">
        <div class="text-center text-base-content/60 px-4 text-sm">
            <p class="mb-1">
                GitHub:
                <a href="https://github.com/xxnuo/serverless-qrcode-hub"
                    class="link link-primary font-medium" target="_blank">xxnuo/serverless-qrcode-hub</a>
            </p>
            <p>如果觉得有用，请给我一个 Star ⭐️</p>
        </div>
    </footer>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            const button = document.getElementById('loginBtn');

            button.disabled = true;
            button.innerHTML = `
                <span class="loading loading-spinner"></span>
                登录中...
            `;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    button.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        登录成功
                    `;
                    window.location.href = '/admin';
                } else {
                    const data = await response.json().catch(() => ({}));
                    error.querySelector('span').textContent = data.error || '密码错误，请重试';
                    error.style.display = 'flex';
                    error.classList.remove('alert-enter');
                    void error.offsetWidth;
                    error.classList.add('alert-show');
                    button.disabled = false;
                    button.textContent = '登 录';
                }
            } catch (e) {
                error.querySelector('span').textContent = '网络错误，请稍后重试';
                error.style.display = 'flex';
                button.disabled = false;
                button.textContent = '登 录';
            }
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        document.getElementById('password').focus();
    </script>
</body>

</html>

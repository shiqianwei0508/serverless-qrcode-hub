name = "serverless-qrcode-hub-dev"
main = "index.js"
compatibility_date = "2025-03-10"

[env.dev.vars]
# Password for the DEV environment only. In production, do NOT put the password
# here as plaintext. Set it via the Cloudflare dashboard (Variables) or run
# `wrangler secret put PASSWORD` before a bare `wrangler deploy`.
PASSWORD = "test1234"

[[d1_databases]]
binding = "DB"
database_name = "qrcode_hub"
# Note: replace the id below with your own D1 storage id to make it work!
database_id = "060f6d75-397d-4d39-b6b3-339b9224d6d7"

[triggers]
crons = ["0 2 */1 * *"]

[[env.dev.d1_databases]]
binding = "DB"
database_name = "qrcode_hub_dev"
database_id = "1cfa1ef6-a076-410b-aa19-50f63411313c"

[env.dev.triggers]
crons = ["*/10 * * * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"
